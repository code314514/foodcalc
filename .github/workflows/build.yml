name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev build-essential git autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev openjdk-17-jdk zip unzip
          pip3 install --user buildozer cython

      - name: Build APK (init p4a)
        continue-on-error: true
        run: |
          export PATH=$HOME/.local/bin:$PATH
          buildozer android debug

      - name: Fix numpy recipe
        run: python3 fix_numpy.py

      - name: Build APK (final)
        run: |
          export PATH=$HOME/.local/bin:$PATH
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: foodcalc-apk
          path: bin/*.apk
